swagger: "2.0"
info:
  title: OATI CRUD API
  description: |
    API REST para gestión de tutoriales y comentarios
  version: 1.0.0
  termsOfService: http://swagger.io/terms/
  contact:
    email: sjgarciat8@gmail.com
basePath: /api/v1
paths:
  /comments/{id}:
    put:
      tags:
      - oati-crud-comentarios/controllersCommentController
      description: |-
        Actualiza el contenido de un comentario
        <br>
      operationId: CommentController.Actualizar comentario
      parameters:
      - in: path
        name: id
        description: ID del comentario
        required: true
        type: integer
        format: int64
      - in: body
        name: body
        description: Datos del comentario
        required: true
        schema:
          $ref: '#/definitions/dtos.UpdateCommentRequest'
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/dtos.CommentResponse'
        "400":
          description: '{object} dtos.ErrorResponse'
        "404":
          description: '{object} dtos.ErrorResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
    delete:
      tags:
      - oati-crud-comentarios/controllersCommentController
      description: |-
        Elimina un comentario por ID
        <br>
      operationId: CommentController.Eliminar comentario
      parameters:
      - in: path
        name: id
        description: ID del comentario
        required: true
        type: integer
        format: int64
      responses:
        "204":
          description: '"No Content"'
        "400":
          description: '{object} dtos.ErrorResponse'
        "404":
          description: '{object} dtos.ErrorResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
  /tutorials:
    get:
      tags:
      - oati-crud-comentarios/controllersTutorialController
      description: |-
        Obtiene todos los tutoriales sin comentarios anidados
        <br>
      operationId: TutorialController.Listar tutoriales
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/dtos.TutorialListResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
    post:
      tags:
      - oati-crud-comentarios/controllersTutorialController
      description: |-
        Crea un nuevo tutorial. published_at debe estar en formato RFC3339 (ej: 2026-06-18T00:00:00Z)
        <br>
      operationId: TutorialController.Crear tutorial
      parameters:
      - in: body
        name: body
        description: Datos del tutorial
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateTutorialRequest'
      responses:
        "201":
          description: ""
          schema:
            $ref: '#/definitions/dtos.TutorialResponse'
        "400":
          description: '{object} dtos.ErrorResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
  /tutorials/{id}:
    get:
      tags:
      - oati-crud-comentarios/controllersTutorialController
      description: |-
        Obtiene un tutorial por ID con sus comentarios anidados
        <br>
      operationId: TutorialController.Obtener tutorial
      parameters:
      - in: path
        name: id
        description: ID del tutorial
        required: true
        type: integer
        format: int64
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/dtos.TutorialDetailResponse'
        "400":
          description: '{object} dtos.ErrorResponse'
        "404":
          description: '{object} dtos.ErrorResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
    put:
      tags:
      - oati-crud-comentarios/controllersTutorialController
      description: |-
        Actualiza un tutorial existente
        <br>
      operationId: TutorialController.Actualizar tutorial
      parameters:
      - in: path
        name: id
        description: ID del tutorial
        required: true
        type: integer
        format: int64
      - in: body
        name: body
        description: Datos del tutorial
        required: true
        schema:
          $ref: '#/definitions/dtos.UpdateTutorialRequest'
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/dtos.TutorialResponse'
        "400":
          description: '{object} dtos.ErrorResponse'
        "404":
          description: '{object} dtos.ErrorResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
    delete:
      tags:
      - oati-crud-comentarios/controllersTutorialController
      description: |-
        Elimina un tutorial y sus comentarios asociados
        <br>
      operationId: TutorialController.Eliminar tutorial
      parameters:
      - in: path
        name: id
        description: ID del tutorial
        required: true
        type: integer
        format: int64
      responses:
        "204":
          description: '"No Content"'
        "400":
          description: '{object} dtos.ErrorResponse'
        "404":
          description: '{object} dtos.ErrorResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
  /tutorials/{tutorialId}/comments:
    get:
      tags:
      - oati-crud-comentarios/controllersCommentController
      description: |-
        Obtiene todos los comentarios de un tutorial
        <br>
      operationId: CommentController.Listar comentarios de un tutorial
      parameters:
      - in: path
        name: tutorialId
        description: ID del tutorial
        required: true
        type: integer
        format: int64
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/dtos.CommentListResponse'
        "400":
          description: '{object} dtos.ErrorResponse'
        "404":
          description: '{object} dtos.ErrorResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
    post:
      tags:
      - oati-crud-comentarios/controllersCommentController
      description: |-
        Crea un comentario asociado a un tutorial
        <br>
      operationId: CommentController.Crear comentario
      parameters:
      - in: path
        name: tutorialId
        description: ID del tutorial
        required: true
        type: integer
        format: int64
      - in: body
        name: body
        description: Datos del comentario
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateCommentRequest'
      responses:
        "201":
          description: ""
          schema:
            $ref: '#/definitions/dtos.CommentResponse'
        "400":
          description: '{object} dtos.ErrorResponse'
        "404":
          description: '{object} dtos.ErrorResponse'
        "500":
          description: '{object} dtos.ErrorResponse'
definitions:
  dtos.CommentListResponse:
    title: CommentListResponse
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/dtos.CommentResponse'
      total:
        type: integer
        format: int64
  dtos.CommentResponse:
    title: CommentResponse
    type: object
    properties:
      content:
        description: Contenido del comentario
        type: string
        example: Comentario de prueba
      created_at:
        description: Fecha de creación del comentario
        type: string
        example: "2026-06-18T00:00:00Z"
        format: datetime
      id:
        type: integer
        format: int64
      tutorial_id:
        description: ID del tutorial
        type: integer
        example: 1
        format: int64
      updated_at:
        description: Fecha de actualización del comentario
        type: string
        example: "2026-06-18T00:00:00Z"
        format: datetime
  dtos.CreateCommentRequest:
    title: CreateCommentRequest
    type: object
    properties:
      content:
        type: string
  dtos.CreateTutorialRequest:
    title: CreateTutorialRequest
    type: object
    properties:
      description:
        description: Descripción del tutorial
        type: string
        example: Descripción del tutorial
      published_at:
        description: Fecha de publicación del tutorial
        type: string
        example: "2026-06-18T00:00:00Z"
      title:
        description: Título del tutorial
        type: string
        example: Tutorial de prueba
  dtos.TutorialDetailResponse:
    title: TutorialDetailResponse
    type: object
    properties:
      comments:
        type: array
        items:
          $ref: '#/definitions/dtos.CommentResponse'
      created_at:
        description: Fecha de creación del tutorial
        type: string
        example: "2026-06-18T00:00:00Z"
        format: datetime
      description:
        description: Descripción del tutorial
        type: string
        example: Descripción del tutorial
      id:
        type: integer
        format: int64
      published_at:
        description: Fecha de publicación del tutorial
        type: string
        example: "2026-06-18T00:00:00Z"
        format: datetime
      title:
        description: Título del tutorial
        type: string
        example: Tutorial de prueba
      updated_at:
        description: Fecha de actualización del tutorial
        type: string
        example: "2026-06-18T00:00:00Z"
        format: datetime
  dtos.TutorialListResponse:
    title: TutorialListResponse
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/dtos.TutorialResponse'
      total:
        type: integer
        format: int64
  dtos.TutorialResponse:
    title: TutorialResponse
    type: object
    properties:
      created_at:
        description: Fecha de creación del tutorial
        type: string
        example: "2026-06-18T00:00:00Z"
        format: datetime
      description:
        description: Descripción del tutorial
        type: string
        example: Descripción del tutorial
      id:
        type: integer
        format: int64
      published_at:
        description: Fecha de publicación del tutorial
        type: string
        example: "2026-06-18T00:00:00Z"
        format: datetime
      title:
        description: Título del tutorial
        type: string
        example: Tutorial de prueba
      updated_at:
        description: Fecha de actualización del tutorial
        type: string
        example: "2026-06-18T00:00:00Z"
        format: datetime
  dtos.UpdateCommentRequest:
    title: UpdateCommentRequest
    type: object
    properties:
      content:
        type: string
  dtos.UpdateTutorialRequest:
    title: UpdateTutorialRequest
    type: object
    properties:
      description:
        description: Descripción del tutorial
        type: string
        example: Descripción del tutorial
      published_at:
        description: Fecha de publicación del tutorial
        type: string
        example: "2026-06-18T00:00:00Z"
      title:
        description: Título del tutorial
        type: string
        example: Tutorial de prueba
