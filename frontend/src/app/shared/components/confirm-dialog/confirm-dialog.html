@if (open()) {
  <div class="glass-overlay fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-md p-6" role="dialog" aria-modal="true">
      <h2 class="text-lg font-semibold text-slate-900">{{ title() }}</h2>
      <p class="mt-2 text-sm text-slate-600">{{ message() }}</p>
      <div class="mt-6 flex justify-end gap-3">
        <button
          type="button"
          class="glass-btn px-4 py-2"
          [disabled]="loading()"
          (click)="onCancel()"
        >
          {{ cancelLabel() }}
        </button>
        <button
          type="button"
          class="glass-btn-danger-solid px-4 py-2 disabled:opacity-50"
          [disabled]="loading()"
          (click)="onConfirm()"
        >
          {{ loading() ? 'Eliminando...' : confirmLabel() }}
        </button>
      </div>
    </div>
  </div>
}
