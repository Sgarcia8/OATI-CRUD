@if (message()) {
  <div
    class="mb-4 flex items-start justify-between rounded-lg px-4 py-3 text-sm"
    [class.glass-alert-error]="type() === 'error'"
    [class.glass-alert-success]="type() === 'success'"
    role="alert"
  >
    <span>{{ message() }}</span>
    <button
      type="button"
      class="ml-4 font-medium opacity-70 hover:opacity-100"
      (click)="dismiss()"
      aria-label="Cerrar"
    >
      ×
    </button>
  </div>
}
